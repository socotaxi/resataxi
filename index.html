
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PNR Réservation Taxi</title>
  <meta name="theme-color" content="#3b82f6">
  <link rel="manifest" href="/resataxi/manifest.json">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100">

<div class="max-w-md mx-auto p-4 bg-white shadow-md rounded-lg mt-10">
  <h1 class="text-2xl font-bold text-center text-blue-600 flex items-center justify-center gap-2">
  <img src="/resataxi/logo.png" alt="Logo" class="h-8 w-auto"> PNR Réservation Taxi</h1>

  <div id="errorContainer" class="text-red-600 text-sm"></div>

  <div id="loginPage">
    <h2 class="text-xl mt-4">Connexion</h2>
    <input id="email" type="email" placeholder="Email" class="border rounded w-full p-2 mt-2">
    <input id="password" type="password" placeholder="Mot de passe" class="border rounded w-full p-2 mt-2">
    <button onclick="login()" class="bg-blue-500 text-white w-full py-2 rounded mt-2 hover:bg-blue-600 transition">Se connecter</button>
    <p class="mt-2 text-sm">Pas encore inscrit ? <a href="#" onclick="showRegister()" class="text-blue-600">Créer un compte</a></p>
  </div>

  <div id="registerPage" class="hidden">
    <h2 class="text-xl mt-4">Créer un compte</h2>
    <input id="regName" type="text" placeholder="Nom" class="border rounded w-full p-2 mt-2">
    <input id="regEmail" type="email" placeholder="Email" class="border rounded w-full p-2 mt-2">
    <input id="regPassword" type="password" placeholder="Mot de passe" class="border rounded w-full p-2 mt-2">
    <button onclick="register()" class="bg-green-500 text-white w-full py-2 rounded mt-2 hover:bg-green-600 transition">S'inscrire</button>
    <p class="mt-2 text-sm"><a href="#" onclick="showLogin()" class="text-blue-600">Déjà inscrit ? Connexion</a></p>
  </div>

  <div id="reservationPage" class="hidden">
    <h2 class="text-xl mt-4">Nouvelle réservation</h2>
    <p id="welcomeMessage" class="text-green-600 font-semibold"></p>
    <input id="nom" type="text" readonly class="border rounded w-full p-2 mt-2 bg-gray-100">
    <input id="depart" type="text" placeholder="Point de départ" class="border rounded w-full p-2 mt-2">
    <input id="arrivee" type="text" placeholder="Lieu d'arrivée" class="border rounded w-full p-2 mt-2">
    <input id="heure" placeholder="Heure de départ" class="border rounded w-full p-2 mt-2">
    <textarea id="commentaires" placeholder="Commentaires" class="border rounded w-full p-2 mt-2"></textarea>
    <div id="map" class="w-full h-64 mt-4 rounded"></div>
    <button onclick="envoyerReservation()" class="bg-blue-600 text-white w-full py-2 rounded mt-2 hover:bg-blue-700 transition">RESERVER ></button>
    <div id="timer" class="text-center text-lg text-green-600 mt-4 hidden">⏳ 0s</div>
    <button onclick="logout()" class="bg-red-500 text-white w-full py-2 rounded mt-4 hover:bg-red-600 transition">Se déconnecter</button>
  </div>

  <div class="text-center mt-4">
    <button id="installButton" class="bg-green-500 text-white py-2 px-4 rounded shadow hover:bg-green-600 transition hidden">📲 Installer PNR</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
flatpickr("#heure",{enableTime:true,noCalendar:true,dateFormat:"H:i",time_24hr:true});
const firebaseConfig={apiKey:"AIzaSyDeKlTzZtAU_vSW7sbX7P9DVGD3LuCvajI",authDomain:"reservation-taxi-2.firebaseapp.com",projectId:"reservation-taxi-2",storageBucket:"reservation-taxi-2.appspot.com",messagingSenderId:"916656717121",appId:"1:916656717121:web:aeccb95dd97a31a226f5c0"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();const db=firebase.firestore();const loginPage=document.getElementById('loginPage');const registerPage=document.getElementById('registerPage');const reservationPage=document.getElementById('reservationPage');const welcomeMessage=document.getElementById('welcomeMessage');const errorContainer=document.getElementById('errorContainer');let timerInterval=null;
function showError(message){errorContainer.textContent=message;setTimeout(()=>{errorContainer.textContent='';},5000);}
function showLogin(){loginPage.classList.remove('hidden');registerPage.classList.add('hidden');reservationPage.classList.add('hidden');}
function showRegister(){registerPage.classList.remove('hidden');loginPage.classList.add('hidden');reservationPage.classList.add('hidden');}
auth.onAuthStateChanged(user=>{if(user){db.collection('users').doc(user.uid).get().then(doc=>{if(doc.exists&&doc.data().name){afficherReservationPage(doc.data().name);}else{showError("Données utilisateur manquantes.");logout();}});}else{showLogin();}});
function login(){const email=document.getElementById('email').value.trim();const password=document.getElementById('password').value.trim();if(!email||!password){showError("Remplir les champs.");return;}
auth.signInWithEmailAndPassword(email,password).then(cred=>{db.collection('users').doc(cred.user.uid).get().then(doc=>{if(doc.exists&&doc.data().name){afficherReservationPage(doc.data().name);}else{showError("Données utilisateur manquantes.");logout();}});}).catch(e=>showError(e.message));}
function register(){const name=document.getElementById('regName').value.trim();const email=document.getElementById('regEmail').value.trim();const password=document.getElementById('regPassword').value.trim();if(!name||!email||!password){showError("Remplir tous les champs.");return;}
auth.createUserWithEmailAndPassword(email,password).then(cred=>db.collection('users').doc(cred.user.uid).set({name}).then(()=>{showError("Inscription réussie.");showLogin();})).catch(e=>showError(e.message));}
function logout(){auth.signOut().then(()=>location.reload());}
function envoyerReservation(){const depart=document.getElementById('depart').value.trim();const arrivee=document.getElementById('arrivee').value.trim();const heure=document.getElementById('heure').value;const commentaires=document.getElementById('commentaires').value.trim();const nom=document.getElementById('nom').value;if(!depart||!arrivee||!heure){showError("Remplir les champs obligatoires.");return;}
navigator.geolocation.getCurrentPosition(pos=>{const lat=pos.coords.latitude.toFixed(6);const lon=pos.coords.longitude.toFixed(6);const telSociete="242050787624";const googleMapsLink=`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`;const message=`Réservation Taxi:\n- Nom: ${nom}\n- Départ: ${depart}\n- Arrivée: ${arrivee}\n- Heure: ${heure}\n- Commentaires: ${commentaires}\n- Itinéraire Google Maps: ${googleMapsLink}`;const url=`https://wa.me/${telSociete}?text=${encodeURIComponent(message)}`;window.location.href=url;db.collection('reservations').add({nom,depart,arrivee,heure,commentaires,latitude:lat,longitude:lon,date:new Date()});lancerTimer();},err=>{showError('Erreur GPS : '+err.message);});}
function lancerTimer(){clearInterval(timerInterval);let sec=0;const timer=document.getElementById('timer');timer.classList.remove('hidden');timer.textContent=`⏳ 0s`;timerInterval=setInterval(()=>{sec++;timer.textContent=`⏳ ${sec}s`;},1000);}
function afficherReservationPage(name){document.getElementById('nom').value=name;welcomeMessage.textContent=`Bienvenue, ${name} !`;reservationPage.classList.remove('hidden');loginPage.classList.add('hidden');registerPage.classList.add('hidden');const map=L.map('map').setView([0,0],13);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);navigator.geolocation.getCurrentPosition(pos=>{const lat=pos.coords.latitude;const lon=pos.coords.longitude;map.setView([lat,lon],15);L.marker([lat,lon]).addTo(map).bindPopup('Votre position').openPopup();},err=>{showError('Erreur GPS : '+err.message);});}
</script>
<script>if('serviceWorker'in navigator){navigator.serviceWorker.register('/resataxi/service-worker.js').then(()=>console.log('Service Worker enregistré')).catch(error=>console.log('Erreur SW',error));}let deferredPrompt;window.addEventListener('beforeinstallprompt',(e)=>{e.preventDefault();deferredPrompt=e;document.getElementById('installButton').style.display='inline-block';});document.getElementById('installButton').addEventListener('click',()=>{if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then((choiceResult)=>{if(choiceResult.outcome==='accepted'){console.log('Installation acceptée');}else{console.log('Installation refusée');}deferredPrompt=null;document.getElementById('installButton').style.display='none';});}});</script>
</body>
</html>
